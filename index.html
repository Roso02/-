<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>로소의 전직가이드(Ver.1)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; max-width: 500px; margin: auto; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 5px; }
        .tab-btn { padding: 10px; cursor: pointer; border: 1px solid #ccc; background: #fff; flex: 1; }
        .tab-btn.active { background: #e0e0e0; font-weight: bold; }
        select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #aaa; }
        #result { 
            margin-top: 20px; 
            padding: 20px; 
            border: 2px solid #333; 
            border-radius: 10px; 
            text-align: left; 
            background: #f9f9f9; 
            min-height: 100px;
            white-space: pre-wrap; /* 줄바꿈 적용 */
            line-height: 1.6; /* 가독성을 위한 줄간격 */
        }
    </style>
</head>
<body>
    <h2>로소의 전직가이드(Ver.1)</h2>
    <div class="tabs" id="jobTabs">
        <button class="tab-btn" onclick="selectJob('소서러', this)">소서러</button>
        <button class="tab-btn" onclick="selectJob('버서커', this)">버서커</button>
        <button class="tab-btn" onclick="selectJob('레인져', this)">레인져</button>
        <button class="tab-btn" onclick="selectJob('팔라딘', this)">팔라딘</button>
        <button class="tab-btn" onclick="selectJob('다크나이트', this)">다크나이트</button>
    </div>
    <select id="usageSelect" onchange="showRoute()">
        <option value="">용도를 선택하세요</option>
        <option value="파밍">파밍</option>
        <option value="보스">보스</option>
        <option value="콜로">콜로</option>
    </select>
    <select id="routeSelect" onchange="showDescription()">
        <option value="">추천 루트 선택</option>
    </select>
    <div id="result">직업과 용도를 선택해 주세요.</div>

    <script>
        const data = {
            "소서러": {
                "파밍": { 
                    "이그컨저마로": "어부30까지 입구사냥에서 주요딜러로 쓰입니다.", 
                    "아크닼로오포": "메인 탱커 전직루트입니다.",
                    "이그닼로마로, 아크닼로마로": "등반 이후 두개 이상의 땅을 파밍할때 닼로가 추가로 필요한 경우가 생깁니다.\n그때 탱커가 아닌 근접딜러겸 디버퍼로 사용합니다."
                },
                "보스": { 
                    "다크닼로마로": "폴리모프 스킬로 아군을 더 오래 버티게 하기 위함으로 셋팅 전까진 탱닼로라도 넣어야합니다.\n딜러들의 탱킹이 어느 정도 갖춰지면 빼고 퓨어딜러를 추가합니다." 
                },
                "콜로": { 
                    "아크닼로오포": "소세덱에서 탱커로 사용됩니다.",
                    "아크컨저마로": "광역덱에서 메인딜러로 사용됩니다.\n아크를 사용하는 이유는 지속적인 딜과 라이딩 장비(비열)의 효과를 보기 위해서입니다.",
                    "이그일루마로": "광역덱에서 서브딜러겸 디버퍼로 사용됩니다.\n추가로 선호에 따라 광역덱은 소서러 두명이 1컨저 1일루인 경우와 2컨저인 경우로 나눠집니다."
                }
            },
            "버서커": {
                "파밍": { 
                    "해당없음": "주로 아이템을 스왑해서 사용하기에 파밍전용으로는 잘 사용하지 않습니다." 
                },
                "보스": { 
                    "데코디트소엠": "메인급 딜러인 데코디트소엠, 스나아케데아, 실버익큐홀나, 에퀴드브데스 중 하나입니다.", 
                    "버서커 버퍼 루트 (택1)": "[두 선택지 중 하나 필수]\n1. 데코디트배커 & 듀얼바바소엠\n2. 듀얼바바배커\n\n버서커 버퍼의 경우 3차에 바바리안과 4차에 배틀커멘더 둘이 있는데 이 둘을 합쳐서 사용해도 되고 분리해서 사용해도 됩니다."
                },
                "콜로": { 
                    "데코바바배커": "광역덱에서 서브탱커이자 버퍼입니다.",
                    "듀얼소세배커": "소세덱의 메인딜러이자 광역덱에서도 선택 가능한 전직루트입니다.",
                    "데코디트배커": "광역덱에서 선택 가능한 전직루트입니다.\n일반적으로 듀얼소세배커와 데코디트배커 둘 중 하나를 사용합니다."
                }
            },
            "레인져": {
                "파밍": { 
                    "호크스카스슈": "카부까지는 괜찮은 파밍 딜러입니다. 어부 진입 후 거의 사용하지 않습니다." 
                },
                "보스": { 
                    "스나아케데아": "메인급 딜러인 데코디트소엠, 스나아케데아, 실버익큐홀나, 에퀴드브데스 중 하나입니다.",
                    "서몬아케데아": "디버퍼겸 서브딜러로 1명은 필수로 전직합니다."
                },
                "콜로": { 
                    "서몬민스스슈": "소세덱 버퍼입니다. 죽지 않도록 탱으로 주로 갑니다." 
                }
            },
            "팔라딘": {
                "파밍": { 
                    "다크가뎐하프": "탱커입니다. 도발을 하여 어그로를 가져가기에 스턴이 있는 헌터를 파밍 및 필드보스에 보내고 싶다면 필수 직업입니다.\n주로 첫번째 가뎐은 콜로겸 파밍용도로 크루가뎐하프를 사용하고 두번째 가뎐부터는 다크가뎐하프로 추천합니다.",
                    "다크익큐홀나": "블레이즈 망치가 나오기 전에 추천하는 근딜입니다.",
                    "다크인퀴홀나": "블레이즈 망치가 나온 후 추천하는 근딜입니다."
                },
                "보스": { 
                    "다크익큐하프": "월보에서 버퍼&디버퍼로 지던 376층에 겸용으로 사용할 수 있습니다. 1명은 필수로 전직합니다.",
                    "실버익큐홀나": "메인급 딜러인 데코디트소엠, 스나아케데아, 실버익큐홀나, 에퀴드브데스 중 하나입니다.\n파밍 능력이 전무하기에 쓴다면 지던 376 겸용으로 쓰는게 좋습니다."
                },
                "콜로": { 
                    "크루가뎐하프": "소세덱과 광역덱에서 메인탱커입니다.\n첫 가뎐을 만들 때 콜로 및 파밍에 사용할 수 있기에 추천드립니다." 
                }
            },
            "다크나이트": {
                "파밍": { 
                    "에퀴드브데스": "입구 사냥 이후 추천하는 근딜입니다.\n순간 딜량이 엄청 높기에 입구사냥에는 추천하지 않습니다. 앞뜰과 사랑니 컨텐츠에 매우 좋습니다." 
                },
                "보스": { 
                    "에퀴드브데스": "버퍼이자 메인급 딜러인 데코디트소엠, 스나아케데아, 실버익큐홀나, 에퀴드브데스 중 하나입니다. 1명은 필수로 전직합니다." 
                },
                "콜로": { 
                    "쉐스어비스데스": "소세덱에서 서몬민스스슈 대신에 사용할 수 있습니다.",
                    "쉐스드브데스": "요즘 나온 드브덱의 메인딜러입니다. 승전에서 조커픽으로 사용되고 있습니다."
                }
            }
        };

        let currentJob = "";
        
        function selectJob(job, btn) {
            currentJob = job;
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            
            // 직업을 바꿀 때마다 용도와 루트 선택 초기화
            document.getElementById('usageSelect').value = ""; 
            document.getElementById('routeSelect').innerHTML = '<option value="">추천 루트 선택</option>';
            document.getElementById('result').innerText = job + "을(를) 선택하셨습니다. 용도를 선택해주세요.";
        }
        
        function showRoute() {
            const usage = document.getElementById('usageSelect').value;
            const routeSelect = document.getElementById('routeSelect');
            routeSelect.innerHTML = '<option value="">추천 루트 선택</option>';
            if (data[currentJob] && data[currentJob][usage]) {
                Object.keys(data[currentJob][usage]).forEach(route => {
                    let opt = document.createElement('option');
                    opt.value = route; 
                    opt.innerHTML = route;
                    routeSelect.appendChild(opt);
                });
            }
        }
        
        function showDescription() {
            const usage = document.getElementById('usageSelect').value;
            const route = document.getElementById('routeSelect').value;
            if (data[currentJob] && data[currentJob][usage] && data[currentJob][usage][route]) {
                document.getElementById('result').innerText = data[currentJob][usage][route];
            }
        }
    </script>
</body>
</html>
